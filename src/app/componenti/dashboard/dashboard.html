<mat-toolbar class="header-sfondo mat-elevation-z4">
  @if (auth.grant().isLogged){
    <button mat-icon-button [matMenuTriggerFor]="menu" class="example-icon"
        aria-label="Example icon-button with menu icon">
        <mat-icon>menu</mat-icon>
    </button>
    <mat-menu #menu="matMenu">
        <button mat-menu-item (click)="changePWD()">
            <mat-icon>password</mat-icon>
            <span>Cambio password</span>
        </button>
        <button mat-menu-item (click)="profile()">
            <mat-icon>person</mat-icon>
            <span>Profilo</span>
        </button>
    </mat-menu>
    }
    <span class="titolo-ecommerce">
        <mat-icon class="icona-titolo">shopping_bag</mat-icon>
        E-COMMERCE PADOVA
    </span>
    <span class="example-spacer"></span>
    <button mat-icon-button class="nav-button" (click)="login()" matTooltip="Login">
        <mat-icon>login</mat-icon>
    </button>
    <button mat-icon-button class="nav-button" (click)="logout()" matTooltip="Logout">
        <mat-icon>logout</mat-icon>
    </button>
</mat-toolbar>

<mat-toolbar class="sub-nav-bar">
    <button mat-button routerLink="home">
        <mat-icon>home</mat-icon>
        <span>HOME</span>
    </button>
    <button mat-button routerLink="prodotti">
        <mat-icon>category</mat-icon>
        <span>PRODOTTI</span>
    </button>
    @if(!auth.grant().isAdmin && !auth.grant().isVenditore){
        <button mat-button routerLink="carello">
            <mat-icon [matBadge]="quantitaCarrello" matBadgeColor="warn" [matBadgeHidden]="quantitaCarrello === 0" aria-hidden="false">shopping_cart</mat-icon>
            <span>CARRELLO</span>
        </button>
    }
    @if(auth.grant().isLogged && auth.grant().isAdmin){
        <button mat-button routerLink="utente">
            <mat-icon>person</mat-icon>
            <span>UTENTI</span>
        </button>
        <button mat-button routerLink="notifica">
            <mat-icon>notifications</mat-icon>
            <span>NOTIFICHE</span>
        </button>
    }
</mat-toolbar>

<mat-drawer-container class="example-container">
    
    <mat-drawer-content>
        <router-outlet></router-outlet>
    </mat-drawer-content>
</mat-drawer-container>
