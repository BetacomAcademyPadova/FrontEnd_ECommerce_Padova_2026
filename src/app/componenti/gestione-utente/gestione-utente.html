<div class="container">
    <mat-card class="example-card" appearance="outlined">
        <mat-card-header class="header-row">
            <mat-card-title>ELENCO UTENTI</mat-card-title>
        </mat-card-header>    
        <mat-divider style="margin-top: 20px;"></mat-divider>
        <mat-card-content>
            <table class="table table-stripped ">
                <thead>
                    <tr>
                        <th>NOME</th>
                        <th>COGNOME</th>
                        <th>EMAIL</th>
                        <th>TELEFONO</th>
                        <th>RUOLO</th>
                    </tr>
                </thead>
                <tbody>
                @for (ut of utenti(); track ut.id) 
                {
                    <tr (click)="onSelected(ut)" class="clickable-row">
                        <td>{{ut.nome}}</td>
                        <td>{{ut.cognome}}</td>
                        <td>{{ut.email}}</td>
                        <td>{{ut.telefono}}</td>
                        <td>{{ut.ruolo}}</td>
                    </tr>
                }   
                </tbody>
            </table>  
        </mat-card-content>
    </mat-card>
</div>
