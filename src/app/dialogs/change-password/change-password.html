<div class="container dialog-container">
    <button mat-icon-button mat-dialog-close class="dialog-close-btn">
        <mat-icon>close</mat-icon>
    </button>
    <h2 mat-dialog-title>Modifica password</h2>
    
    <mat-dialog-content>
        <form #pwdForm="ngForm" (ngSubmit)="onSubmit(pwdForm)">
            
            <mat-form-field appearance="outline" class="w-full">
                <mat-label>Password attuale</mat-label>
                <input matInput type="password" name="oldpassword" placeholder="Introdurre password attuale" ngModel required>
            </mat-form-field>

            <mat-form-field appearance="outline" class="w-full">
                <mat-label>Nuova Password</mat-label>
                <input matInput type="password" name="newpassword" placeholder="Introdurre nuova password" ngModel required>
            </mat-form-field>

            <mat-form-field appearance="outline" class="w-full">
                <mat-label>Conferma Password</mat-label>
                <input matInput type="password" name="cntrlpassword" placeholder="Controllo nuova password" ngModel required>
            </mat-form-field>

            <p style="color:red; font-size: 14px; margin-top: 5px;">{{msg()}}</p>
            
            <div class="button-group">
                <button mat-flat-button class="btn-salva-custom" type="submit" [disabled]="!pwdForm.valid">
                    CONFERMA MODIFICA
                </button>
            </div>

        </form>
    </mat-dialog-content>
</div>
