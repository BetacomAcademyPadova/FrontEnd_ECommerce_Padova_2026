<div class="dialog-container">
    <button mat-icon-button mat-dialog-close class="dialog-close-btn">
        <mat-icon>close</mat-icon>
    </button>

    <h2 mat-dialog-title class="login-title">ACCEDI</h2>

    <mat-dialog-content>
        <form #loginForm="ngForm" (ngSubmit)="onSubmit(loginForm)" class="login-form">
            
            <mat-form-field appearance="outline" class="full-width">
                <mat-label>Username</mat-label>
                <input matInput name="userName" ngModel required>
                <mat-icon matSuffix>person</mat-icon>
            </mat-form-field>

            <mat-form-field appearance="outline" class="full-width">
                <mat-label>Password</mat-label>
                <input matInput type="password" name="password" ngModel required>
                <mat-icon matSuffix>lock</mat-icon>
            </mat-form-field>

            <p style="color:red" class="error-msg">{{msg()}}</p>

            <div class="button-group">
                <button mat-raised-button color="primary" type="submit" [disabled]="!loginForm.valid">Login</button>
                <button mat-button type="button" (click)="registrazione()">Nuovo utente</button>
            </div>

            <mat-checkbox class="forgot-pwd" (change)="onResendChange($event)">Password dimenticata</mat-checkbox>
        </form>
    </mat-dialog-content>
</div>
